name: Monthly Dependency Check

on:
  schedule:
    # Every 7th of the month at 00:00 UTC (09:00 JST)
    - cron: '0 0 7 * *'
  workflow_dispatch:

jobs:
  check-dependencies:
    name: Check Licenses and Versions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Licenses
        run: npx license-checker-rseidelsohn --summary

      - name: Check for Updates
        if: success() || failure()
        run: npm outdated

      - name: Security Audit
        if: success() || failure()
        run: npm audit
